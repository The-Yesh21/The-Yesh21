<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <!-- Galaxy gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020024;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#090979;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.15" />
    </linearGradient>

    <!-- Glow filter for name -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for subtitle -->
    <filter id="softglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Star shimmer animation mask -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)" rx="0"/>

  <!-- Star particles -->
  <circle cx="80"  cy="40"  r="1.2" fill="#ffffff" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="200" cy="25"  r="0.8" fill="#00d4ff" opacity="0.7"><animate attributeName="opacity" values="0.7;1;0.4;1;0.7" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="350" cy="55"  r="1.0" fill="#ffffff" opacity="0.5"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="520" cy="20"  r="1.4" fill="#00d4ff" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.3;0.6" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="45"  r="0.9" fill="#ffffff" opacity="0.7"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="820" cy="30"  r="1.1" fill="#00d4ff" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="140" cy="230" r="1.0" fill="#ffffff" opacity="0.4"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="760" cy="240" r="1.3" fill="#00d4ff" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="450" cy="250" r="0.7" fill="#ffffff" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="870" cy="180" r="1.2" fill="#ffffff" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.7s" repeatCount="indefinite"/></circle>
  <circle cx="30"  cy="150" r="0.9" fill="#00d4ff" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="4.5s" repeatCount="indefinite"/></circle>

  <!-- Thin cyan accent line top -->
  <line x1="0" y1="0" x2="900" y2="0" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>

  <!-- Decorative side dots — Apple-style minimal detail -->
  <circle cx="60" cy="140" r="3" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <circle cx="840" cy="140" r="3" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <circle cx="60" cy="140" r="1.2" fill="#00d4ff" opacity="0.6"/>
  <circle cx="840" cy="140" r="1.2" fill="#00d4ff" opacity="0.6"/>

  <!-- Thin horizontal rule -->
  <line x1="100" y1="195" x2="800" y2="195" stroke="#00d4ff" stroke-width="0.6" opacity="0.3"/>

  <!-- MAIN NAME — Mac SF Pro style: ultra-thin tracking, pure white -->
  <!-- Using system-ui which renders as SF Pro on Apple and clean sans elsewhere -->
  <text
    x="450"
    y="152"
    text-anchor="middle"
    font-family="'SF Pro Display', 'Helvetica Neue', 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="72"
    font-weight="200"
    letter-spacing="18"
    fill="#F5F5F7"
    filter="url(#glow)"
  >YESHWANTH V.</text>

  <!-- SUBTITLE — Apple tagline style: small, light grey, wide tracking -->
  <text
    x="450"
    y="228"
    text-anchor="middle"
    font-family="'SF Pro Text', 'Helvetica Neue', 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="14"
    font-weight="300"
    letter-spacing="6"
    fill="#A1A1A6"
    filter="url(#softglow)"
  >ENGINEER · AI / ML · FULL-STACK · EMBEDDED</text>

  <!-- Bottom cyan wave line accent -->
  <line x1="0" y1="279" x2="900" y2="279" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
</svg>
